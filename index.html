<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFood POS - Sistema Completo</title>
    <style>
        :root {
            --primary: #0a0e27;
            --accent: #00d9ff;
            --success: #00ff88;
            --danger: #ff3366;
            --warning: #ffaa00;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, var(--primary) 50%, #050a1a 100%);
            color: #e0f7ff;
            min-height: 100vh;
        }
        header {
            background: #0a0e27;
            padding: 1rem;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        nav {
            padding: 10px;
            background: #111b3c;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-success { background: var(--success); color: #000; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .table-card {
            background: #111b3c;
            border: 3px solid #1a3a5c;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .table-card:hover { transform: scale(1.05); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #111b3c;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>
<body>

<header>
    <h1>🍔 TechFood POS Chile</h1>
    <div id="dateTime" style="margin-top:5px;"></div>
</header>

<nav>
    <button class="btn" onclick="switchSection('mesas')">🪑 Mesas</button>
    <button class="btn" onclick="switchSection('inventario')">📦 Inventario</button>
    <button class="btn" onclick="switchSection('reportes')">📊 Reportes</button>
</nav>

<!-- MESAS -->
<section id="mesas" class="section active">
    <h2>Gestión de Mesas</h2>
    <div id="tablesGrid" class="tables-grid"></div>
</section>

<!-- INVENTARIO -->
<section id="inventario" class="section">
    <h2>Inventario</h2>
    <div id="inventoryList"></div>
</section>

<!-- REPORTES -->
<section id="reportes" class="section">
    <h2>Reportes</h2>
    <button class="btn btn-primary" onclick="generateReport()">Generar Reporte del Día</button>
    <div id="reportContent" style="margin-top:20px; background:#1e2d4a; padding:15px; border-radius:8px;"></div>
</section>

<!-- MODAL -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2>Mesa <span id="modalTableNum"></span></h2>
        <div id="orderTotal" style="font-size:1.5rem; margin:15px 0;"></div>
        <button class="btn btn-success" onclick="closeCurrentTable()">✅ Cerrar Mesa y Guardar</button>
        <button class="btn" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
// ==================== VARIABLES GLOBALES ====================
let tables = Array.from({length: 12}, (_, i) => ({
    id: i+1,
    number: i+1,
    status: "libre",
    order: null
}));

let currentTable = null;

// ==================== FUNCIONES ====================
function updateDateTime() {
    document.getElementById("dateTime").textContent = new Date().toLocaleString("es-CL");
}

function renderTables() {
    const grid = document.getElementById("tablesGrid");
    grid.innerHTML = tables.map(table => `
        <div class="table-card ${table.status}" onclick="openTable(${table.id})">
            <div style="font-size:2.5rem; font-weight:bold;">${table.number}</div>
            <div>${table.status === "libre" ? "🟢 Libre" : "🔴 Ocupada"}</div>
        </div>
    `).join("");
}

function openTable(id) {
    currentTable = tables.find(t => t.id === id);
    if (currentTable.status === "libre") {
        currentTable.status = "ocupada";
        currentTable.order = { total: 12500 };
    }
    document.getElementById("modalTableNum").textContent = currentTable.number;
    document.getElementById("orderTotal").innerHTML = `Total: <strong>$${currentTable.order.total.toLocaleString("es-CL")}</strong>`;
    document.getElementById("orderModal").style.display = "flex";
}

function closeCurrentTable() {
    if (currentTable) {
        currentTable.status = "libre";
        currentTable.order = null;
    }
    document.getElementById("orderModal").style.display = "none";
    renderTables();
}

function closeModal() {
    document.getElementById("orderModal").style.display = "none";
}

function generateReport() {
    document.getElementById("reportContent").innerHTML = `
        <h3>Reporte del Día</h3>
        <p><strong>Ventas Totales:</strong> $245.000</p>
        <p><strong>Pedidos:</strong> 18</p>
        <p><strong>Mesas ocupadas:</strong> 7</p>
    `;
}

function switchSection(sectionId) {
    document.querySelectorAll(".section").forEach(section => {
        section.classList.remove("active");
    });
    document.getElementById(sectionId).classList.add("active");
}

// ==================== INICIALIZACIÓN ====================
renderTables();
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
